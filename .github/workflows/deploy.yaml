name: CI/CD Microservicio Backend

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagen Backend y push a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: back_ventas
          IMAGE_TAG: latest
        run: |
          docker build -t backend-temp .
          docker tag backend-temp:latest $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

      - name: Desplegar BD y Backend vía SSM
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          REPO=back_ventas
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              'set -e',
              'aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY',
              'docker pull $REGISTRY/$REPO:latest',
              'docker stop backend-ms1 || true',
              'docker rm backend-ms1 || true',
              'docker network create ventas-net || true',
              'docker run -d --name backend-ms1 --network ventas-net -p 8081:8080 $REGISTRY/$REPO:latest'
            ]"
