name: CI/CD Microservicio Backend

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagen Backend y push a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: back_ventas
          IMAGE_TAG: latest
        run: |
          docker build -t backend-temp .
          docker tag backend-temp:latest $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

      - name: Desplegar BD y Backend vía SSM
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          REPO=back_ventas
      
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters commands="[
              'set -e',
              'aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY',
      
              'docker pull $REGISTRY/$REPO:latest',
      
              'docker network create ventas-net || true',
      
              'if [ ! \"$(docker ps -a -q -f name=mysql-db)\" ]; then docker run -d --name mysql-db --network ventas-net -p 3306:3306 -e MYSQL_DATABASE=${{ secrets.DB_NAME }} -e MYSQL_USER=${{ secrets.DB_USER }} -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD }} mysql:8.0; fi',
      
              'docker stop backend-ms1 || true',
              'docker rm backend-ms1 || true',
      
              'docker run -d --name backend-ms1 --network ventas-net -p 8081:8080 -e SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${{ secrets.DB_NAME }}?useSSL=false\\&serverTimezone=UTC\\&allowPublicKeyRetrieval=true -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} $REGISTRY/$REPO:latest'
            ]")
      
          echo COMMAND_ID=$COMMAND_ID
      
          sleep 15
      
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}
