apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-ventas
  template:
    metadata:
      labels:
        app: backend-ventas
    spec:
      containers:
      - name: backend-ventas
        image: 247695027703.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend-ventas:latest
        ports:
        - containerPort: 8080
        resources:
            requests:
              cpu: "100m" 
            limits:
              cpu: "250m"
        env:
        - name: DB_ENDPOINT
          value: "172.31.9.188"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "db_ventas"
        - name: DB_USERNAME
          value: "admin_db"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: backend-ventas-service
spec:
  type: ClusterIP
  selector:
    app: backend-ventas
  ports:
  - port: 8080
    targetPort: 8080
